# Local Postgres for development. `docker compose up -d` then `make migrate-up`.
services:
  db:
    image: postgres:17-alpine
    container_name: wit-sprint-os-db
    environment:
      POSTGRES_USER: wit
      POSTGRES_PASSWORD: wit
      POSTGRES_DB: wit_sprint_os
    ports:
      - "5432:5432"
    volumes:
      - wit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wit -d wit_sprint_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wit_pgdata:
